<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WORKFLOWKIT // EXEC RENDERERS — Component Library</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css">

<style>
  html, body { overflow: auto; }
  body { padding-bottom: 80px; }
  .lib { position: relative; z-index: 1; max-width: 1280px; margin: 0 auto; padding: 0 28px; }

  .lib-head {
    display: grid; grid-template-columns: auto 1fr auto; gap: 24px; align-items: end;
    padding: 56px 0 32px; border-bottom: 1px solid var(--rule);
  }
  .lib-head .mark {
    width: 64px; height: 64px; background: var(--primary);
    clip-path: polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%);
    box-shadow: 0 0 20px rgba(255,107,26,0.6); position: relative;
  }
  .lib-head .mark::after {
    content: "⌗"; position: absolute; inset: 0; display: grid; place-items: center;
    font-family: var(--display); font-weight: 800; color: var(--bg-0); font-size: 30px;
  }
  .lib-head h1 { margin: 0; font-family: var(--display); font-weight: 700; font-size: 52px; letter-spacing: 0.04em; color: var(--ink-strong); line-height: 0.95; }
  .lib-head .sub { font-family: var(--mono); font-size: 12px; color: var(--ink-dim); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 6px; }
  .lib-head .meta { text-align: right; font-family: var(--mono); font-size: 11px; color: var(--ink-dim); letter-spacing: 0.18em; text-transform: uppercase; line-height: 1.7; }
  .lib-head .meta b { color: var(--ink-strong); font-weight: 700; }
  .lib-head .meta a { color: var(--cyan); text-decoration: none; }

  .intro {
    margin: 28px 0 44px; padding: 20px 22px; border: 1px solid var(--rule); background: var(--bg-1);
    font-family: var(--mono); font-size: 13px; line-height: 1.7; color: var(--ink); max-width: 900px;
  }
  .intro b { color: var(--ink-strong); }
  .intro code { color: var(--cyan); background: var(--bg-2); padding: 1px 5px; }
  .intro .flow { margin-top: 12px; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; font-family: var(--display); letter-spacing: 0.12em; text-transform: uppercase; font-size: 11px; }
  .intro .flow .box { border: 1px solid var(--rule-strong); padding: 5px 10px; color: var(--ink-strong); }
  .intro .flow .box.accent { border-color: var(--primary); color: var(--primary); }
  .intro .flow .arr { color: var(--ink-faint); font-family: var(--mono); }

  section.cat { margin: 0 0 52px; border-top: 1px solid var(--rule); padding-top: 22px; }
  section.cat > header { display: grid; grid-template-columns: 60px 1fr auto; align-items: end; gap: 20px; margin-bottom: 24px; }
  section.cat > header .n { font-family: var(--display); font-weight: 800; font-size: 52px; line-height: 1; color: var(--primary); }
  section.cat > header h2 { margin: 0; font-family: var(--display); font-weight: 700; font-size: 30px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-strong); line-height: 1; }
  section.cat > header .d { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); margin-top: 6px; letter-spacing: 0.05em; max-width: 560px; }
  section.cat > header .tag { font-family: var(--display); font-size: 11px; letter-spacing: 0.2em; color: var(--ink-faint); text-transform: uppercase; }

  .grid { display: grid; gap: 18px; }
  .grid.cols-2 { grid-template-columns: 1fr 1fr; }

  .spec { background: var(--bg-1); border: 1px solid var(--rule); display: grid; grid-template-rows: auto 1fr auto; }
  .spec .stitle { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--rule); background: linear-gradient(to bottom, rgba(255,107,26,0.08), transparent); }
  .spec .stitle .dot { width: 6px; height: 6px; background: var(--primary); box-shadow: 0 0 6px var(--primary); }
  .spec .stitle .nm { font-family: var(--display); font-weight: 700; font-size: 12px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--ink-strong); }
  .spec .stitle .st { font-family: var(--mono); font-size: 10px; color: var(--ink-dim); letter-spacing: 0.04em; margin-left: auto; }
  .spec .stitle .st[data-tone="fail"] { color: var(--warn-bright); }
  .spec .stitle .st[data-tone="ok"] { color: var(--good); }
  .spec .stage {
    padding: 16px;
    background: linear-gradient(var(--bg-0), var(--bg-0)), repeating-linear-gradient(45deg, var(--ink-ghost) 0 1px, transparent 1px 12px);
  }
  /* host the event row look around the renderer */
  .stage .ev-faux { border-left: 2px solid var(--amber); padding: 8px 12px; background: var(--bg-1); }
  .stage .ev-faux.fail { border-left-color: var(--warn); }
  .stage .ev-faux .head { display: flex; gap: 10px; align-items: center; font-family: var(--mono); font-size: 10px; color: var(--ink-dim); letter-spacing: 0.06em; margin-bottom: 4px; }
  .stage .ev-faux .head .who { font-family: var(--display); letter-spacing: 0.14em; color: var(--amber); }
  .stage .ev-faux .head .cmd { color: var(--ink-strong); }
  .spec .notes { padding: 10px 14px; border-top: 1px solid var(--rule-soft); background: var(--bg-2); font-family: var(--mono); font-size: 11px; color: var(--ink-dim); display: grid; grid-template-columns: 1fr auto; align-items: center; gap: 10px; }
  .spec .notes b { color: var(--ink); font-weight: 500; }
  .spec .notes .pill { font-family: var(--mono); font-size: 10px; padding: 2px 8px; border: 1px solid var(--rule); color: var(--ink); letter-spacing: 0.04em; cursor: pointer; }
  .spec .notes .pill:hover { border-color: var(--primary); color: var(--primary); }

  .lib-footer { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; padding: 30px 0 0; border-top: 1px solid var(--rule); font-family: var(--mono); font-size: 11px; color: var(--ink-dim); letter-spacing: 0.18em; text-transform: uppercase; }
  .lib-footer .center { text-align: center; color: var(--ink-faint); }
</style>
</head>
<body>
  <div class="plate"></div>
  <div class="grid-bg"></div>

  <div id="root"></div>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" fill="#16110d"/>
      <rect x="30" y="30" width="40" height="40" fill="none" stroke="#ff6b1a" stroke-width="4"/>
      <text x="50" y="58" text-anchor="middle" font-family="monospace" font-size="20" fill="#ff6b1a">⌗</text>
    </svg>
  </template>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- the REAL renderers, shared with the dashboard -->
  <script type="text/babel" src="exec-renderers.jsx"></script>
  <script type="text/babel" src="exec-renderers-samples.jsx"></script>
</body>
</html>
