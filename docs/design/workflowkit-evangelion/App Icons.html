<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WORKFLOWKIT — macOS App Icon Options</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">

<style>
  html, body { margin: 0; height: 100%; }

  /* per-concept card inside an artboard */
  .ic-card {
    width: 100%; height: 100%;
    box-sizing: border-box;
    padding: 22px 24px 26px;
    background: #1a1410;
    background-image:
      radial-gradient(120% 80% at 50% -10%, rgba(255,107,26,0.10), transparent 60%);
    display: flex; flex-direction: column;
    color: #ffb070;
    font-family: "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  .ic-head { display: flex; align-items: baseline; gap: 10px; }
  .ic-no {
    font-family: "JetBrains Mono", monospace; font-size: 12px;
    color: #ff8a3d; letter-spacing: 0.1em;
  }
  .ic-name {
    font-family: "Big Shoulders Display", sans-serif; font-weight: 800;
    font-size: 22px; letter-spacing: 0.14em; text-transform: uppercase;
    color: #ffd9ad;
  }
  .ic-tag {
    margin-top: 5px; font-size: 11px; line-height: 1.45;
    color: rgba(255,176,112,0.6); letter-spacing: 0.02em;
    text-wrap: pretty; min-height: 32px;
  }

  .ic-hero {
    flex: 1; display: grid; place-items: center;
    margin: 6px 0 4px;
  }
  .ic-cap {
    text-align: center; font-size: 9.5px; letter-spacing: 0.22em;
    text-transform: uppercase; color: rgba(255,176,112,0.4);
    margin-bottom: 16px;
  }

  .ic-strip {
    display: flex; align-items: flex-end; justify-content: center; gap: 26px;
    padding-top: 16px; border-top: 1px dashed rgba(255,107,26,0.22);
  }
  .ic-cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .ic-px {
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
    color: rgba(255,176,112,0.45);
  }

  /* the icon tile — macOS squircle + dock shadow */
  .ico {
    border-radius: 22.37%;
    overflow: hidden;
    position: relative;
    box-shadow:
      0 2px 1px rgba(255,255,255,0.06) inset,
      0 18px 34px -14px rgba(0,0,0,0.7),
      0 4px 10px -4px rgba(0,0,0,0.5);
  }
  .ico::after {
    content: ""; position: absolute; inset: 0; border-radius: inherit;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.35) inset;
    pointer-events: none;
  }
  .ico svg { display: block; width: 100%; height: 100%; }
  .ico-svg { position: absolute; inset: 0; }
  .ico-svg svg { display: block; width: 100%; height: 100%; }
  .ico-tx {
    position: absolute; left: 50%; transform: translate(-50%, -50%);
    white-space: nowrap; line-height: 1; text-transform: uppercase;
    pointer-events: none; z-index: 1;
  }
</style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="app-icons.jsx"></script>
</body>
</html>
