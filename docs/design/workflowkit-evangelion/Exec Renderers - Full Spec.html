<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>WORKFLOWKIT // EXEC RENDERERS — Full Spec</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&family=Shippori+Mincho:wght@500;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="styles.css?v=12">

<style>
  html, body { overflow: auto; }
  body { padding-bottom: 80px; }
  .lib { position: relative; z-index: 1; max-width: 1320px; margin: 0 auto; padding: 0 28px; }

  /* ---- masthead ---- */
  .lib-head {
    display: grid; grid-template-columns: auto 1fr auto; gap: 24px; align-items: end;
    padding: 56px 0 28px; border-bottom: 1px solid var(--rule);
  }
  .lib-head .mark {
    width: 64px; height: 64px; background: var(--primary);
    clip-path: polygon(0 0, 100% 0, 100% 70%, 70% 100%, 0 100%);
    box-shadow: 0 0 20px rgba(255,107,26,0.6); position: relative;
  }
  .lib-head .mark::after {
    content: "⌗"; position: absolute; inset: 0; display: grid; place-items: center;
    font-family: var(--display); font-weight: 800; color: var(--bg-0); font-size: 30px;
  }
  .lib-head h1 { margin: 0; font-family: var(--display); font-weight: 700; font-size: 52px; letter-spacing: 0.04em; color: var(--ink-strong); line-height: 0.95; }
  .lib-head .sub { font-family: var(--mono); font-size: 12px; color: var(--ink-dim); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 6px; }
  .lib-head .meta { text-align: right; font-family: var(--mono); font-size: 11px; color: var(--ink-dim); letter-spacing: 0.18em; text-transform: uppercase; line-height: 1.7; }
  .lib-head .meta div { white-space: nowrap; }
  .lib-head .meta b { color: var(--ink-strong); font-weight: 700; }
  .lib-head .meta a { color: var(--cyan); text-decoration: none; }

  /* ---- table of contents ---- */
  .toc {
    display: flex; flex-wrap: wrap; gap: 4px 6px; align-items: center;
    padding: 16px 0 0; margin-bottom: 12px;
  }
  .toc .toc-lbl { font-family: var(--display); font-size: 10px; letter-spacing: 0.24em; color: var(--ink-faint); text-transform: uppercase; margin-right: 8px; }
  .toc a {
    display: inline-flex; align-items: baseline; gap: 6px;
    font-family: var(--display); font-weight: 600; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--ink-dim); text-decoration: none;
    border: 1px solid var(--rule-soft); padding: 4px 9px; background: var(--bg-1);
    transition: color 80ms, border-color 80ms, background 80ms;
  }
  .toc a i { font-family: var(--mono); font-style: normal; font-size: 9px; color: var(--ink-faint); }
  .toc a:hover { color: var(--primary); border-color: var(--primary); background: rgba(255,107,26,0.06); }
  .toc a:hover i { color: var(--primary); }

  /* ---- class banner ---- */
  .class-banner { display: flex; align-items: baseline; gap: 16px; margin: 50px 0 8px; padding: 13px 0 12px; border-top: 2px solid var(--primary); border-bottom: 1px solid var(--rule); scroll-margin-top: 12px; }
  .class-banner .cb-n { font-family: var(--display); font-weight: 800; font-size: 13px; letter-spacing: 0.16em; color: var(--bg-0); background: var(--primary); padding: 3px 10px; align-self: center; }
  .class-banner .cb-title { font-family: var(--display); font-weight: 800; font-size: 30px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--ink-strong); line-height: 1; }
  .class-banner .cb-sub { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); letter-spacing: 0.05em; margin-left: auto; }
  .toc a.toc-cls { color: var(--primary); border-color: var(--primary); font-weight: 700; background: rgba(255,107,26,0.07); }
  .toc a.toc-cls:hover { background: rgba(255,107,26,0.14); }
  table.matrix tr.mx-sep td { background: var(--bg-2); color: var(--primary); font-family: var(--display); font-weight: 700; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; padding: 7px 14px; border-bottom: 1px solid var(--rule); }

  /* ---- group divider ---- */
  .group-divider { display: flex; align-items: center; gap: 16px; margin: 30px 0 4px; }
  .group-divider .gd-line { height: 1px; background: var(--rule); flex: 1; }
  .group-divider .gd-name { font-family: var(--display); font-weight: 700; font-size: 12px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--primary); white-space: nowrap; }

  /* ---- spec sheet ---- */
  .sheet { border-top: 1px solid var(--rule); padding-top: 22px; margin: 0 0 8px; scroll-margin-top: 12px; }
  .sheet-hd { display: grid; grid-template-columns: 64px 1fr auto; align-items: start; gap: 20px; margin-bottom: 20px; }
  .sheet-hd .n { font-family: var(--display); font-weight: 800; font-size: 56px; line-height: 0.82; }
  .sheet-hd .ttl-row { display: block; }
  .sheet-hd .ttl-row h2 { display: inline; vertical-align: baseline; }
  .sheet-hd .ttl-row .comp { display: inline-block; margin-left: 12px; vertical-align: baseline; }
  .sheet-hd h2 { margin: 0; font-family: var(--display); font-weight: 700; font-size: 30px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-strong); line-height: 1; white-space: nowrap; }
  .sheet-hd .comp { font-family: var(--mono); font-size: 13px; color: var(--cyan); background: var(--bg-2); border: 1px solid var(--rule-soft); padding: 2px 8px; letter-spacing: 0.02em; white-space: nowrap; }
  .sheet-hd .desc { font-family: var(--mono); font-size: 12px; line-height: 1.6; color: var(--ink-dim); margin-top: 8px; max-width: 620px; text-wrap: pretty; }
  .sheet-hd .desc .inl { color: var(--cyan); background: var(--bg-2); padding: 0 4px; font-size: 11px; }
  .sheet-hd .trig { text-align: right; display: flex; flex-direction: column; gap: 3px; }
  .sheet-hd .trig-lbl { font-family: var(--display); font-size: 9px; letter-spacing: 0.24em; color: var(--ink-faint); text-transform: uppercase; }
  .sheet-hd .trig-v { font-family: var(--mono); font-size: 11px; color: var(--ink); letter-spacing: 0.04em; }

  .sheet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 22px; align-items: start; padding-bottom: 30px; }
  .col-lbl { display: flex; align-items: center; gap: 8px; font-family: var(--display); font-weight: 600; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--ink-dim); margin-bottom: 12px; }
  .col-lbl .dot { width: 6px; height: 6px; background: var(--primary); box-shadow: 0 0 6px var(--primary); }

  /* left: live stack */
  .live-stack { display: flex; flex-direction: column; gap: 16px; }
  .live-cap { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .live-cap .li-label { font-family: var(--mono); font-size: 11px; color: var(--ink-strong); letter-spacing: 0.04em; }
  .live-cap .li-tone { font-family: var(--display); font-size: 9px; letter-spacing: 0.16em; color: var(--ink-faint); text-transform: uppercase; }
  .live-cap .li-tone[data-tone="fail"] { color: var(--warn-bright); }
  .live-cap .li-tone[data-tone="ok"] { color: var(--good); }
  .live-cap .li-tone[data-tone="empty"] { color: var(--cyan); }
  .live-cap .li-tone[data-tone="preview"] { color: var(--amber); }
  .li-note { margin-top: 7px; font-family: var(--mono); font-size: 10px; line-height: 1.5; color: var(--ink-dim); border-left: 2px solid var(--rule-soft); padding-left: 9px; }

  /* the faux event row hosting the live renderer */
  .ev-faux { border: 1px solid var(--rule); border-left: 2px solid var(--amber); padding: 10px 12px; background: var(--bg-1); }
  .ev-faux.fail { border-left-color: var(--warn); }
  .ev-faux .head { display: flex; gap: 10px; align-items: center; font-family: var(--mono); font-size: 10px; color: var(--ink-dim); letter-spacing: 0.04em; margin-bottom: 6px; flex-wrap: wrap; }
  .ev-faux .head .who { font-family: var(--display); font-weight: 700; letter-spacing: 0.14em; color: var(--amber); }
  .ev-faux .head .cmd { color: var(--ink-strong); }

  /* right: doc blocks */
  .col-doc { display: flex; flex-direction: column; gap: 14px; }
  .doc-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; align-items: start; }
  .doc-block { background: var(--bg-1); border: 1px solid var(--rule); }
  .doc-lbl {
    font-family: var(--display); font-weight: 600; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;
    color: var(--ink-dim); padding: 8px 12px; border-bottom: 1px solid var(--rule-soft);
    background: linear-gradient(to bottom, rgba(255,107,26,0.06), transparent);
  }
  /* doc-lbl used as a sub-heading inside a block (states/tokens) */
  .doc-block .doc-lbl + .chip-row { padding: 10px 12px; }
  .doc-block .chip-row + .doc-lbl { border-top: 1px solid var(--rule-soft); }

  /* code / schema */
  .code { margin: 0; padding: 12px 14px; font-family: var(--mono); font-size: 11px; line-height: 1.6; color: var(--ink); overflow-x: auto; white-space: pre; }
  .code .cl { min-height: 1.6em; }
  .code .cm { color: var(--ink-faint); }
  .code .str { color: var(--good); }
  .code .numlit { color: var(--amber); }

  /* key/value behavior table */
  table.kv { width: 100%; border-collapse: collapse; }
  table.kv th { text-align: left; vertical-align: top; font-family: var(--display); font-weight: 600; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--ink-dim); padding: 7px 12px; width: 92px; border-bottom: 1px dashed var(--rule-soft); }
  table.kv td { font-family: var(--mono); font-size: 11px; line-height: 1.5; color: var(--ink); padding: 7px 12px 7px 0; border-bottom: 1px dashed var(--rule-soft); }
  table.kv tr:last-child th, table.kv tr:last-child td { border-bottom: 0; }
  table.kv td .inl, .pipe + * .inl { color: var(--cyan); }
  table.kv code.inl { color: var(--cyan); font-size: 10px; background: var(--bg-2); padding: 0 3px; }

  /* state + token chips */
  .chip-row { display: flex; flex-wrap: wrap; gap: 6px; padding: 10px 12px; }
  .st-chip { font-family: var(--display); font-weight: 600; font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase; padding: 3px 8px; border: 1px solid var(--rule); color: var(--ink-dim); background: var(--bg-2); }
  .st-chip[data-tone="ok"] { color: var(--good); border-color: rgba(108,240,153,0.4); }
  .st-chip[data-tone="fail"] { color: var(--warn-bright); border-color: rgba(255,84,112,0.5); }
  .st-chip[data-tone="empty"] { color: var(--cyan); border-color: rgba(70,216,255,0.4); }
  .st-chip[data-tone="preview"] { color: var(--amber); border-color: rgba(255,184,0,0.4); }
  .tok-chip { display: inline-flex; align-items: center; gap: 6px; font-family: var(--mono); font-size: 10px; color: var(--ink); border: 1px solid var(--rule-soft); padding: 3px 7px 3px 5px; background: var(--bg-2); }
  .tok-chip i { width: 9px; height: 9px; display: inline-block; }
  .tok-chip b { font-weight: 500; color: var(--ink-strong); }
  .tok-chip code { color: var(--ink-faint); font-size: 9px; }

  /* envelope pipeline */
  .pipe { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; padding: 12px 14px; }
  .pipe-box { font-family: var(--display); font-weight: 600; font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; border: 1px solid var(--rule-strong); padding: 5px 10px; color: var(--ink-strong); }
  .pipe-box.accent { border-color: var(--primary); color: var(--primary); box-shadow: 0 0 10px rgba(255,107,26,0.25); }
  .pipe-box.stage { color: var(--ink); border-color: var(--rule); }
  .pipe-arr { color: var(--ink-faint); font-family: var(--mono); font-size: 12px; }
  .envelope .ttl-row .comp { color: var(--primary); }

  /* appendix matrix */
  .appendix { border-top: 1px solid var(--rule); padding-top: 22px; margin-top: 8px; scroll-margin-top: 12px; }
  .app-hd { display: flex; align-items: baseline; gap: 14px; margin-bottom: 16px; }
  .app-hd h2 { margin: 0; font-family: var(--display); font-weight: 700; font-size: 24px; letter-spacing: 0.04em; text-transform: uppercase; color: var(--ink-strong); }
  .app-hd .app-sub { font-family: var(--mono); font-size: 11px; color: var(--ink-dim); letter-spacing: 0.08em; }
  table.matrix { width: 100%; border-collapse: separate; border-spacing: 0; background: var(--bg-1); border: 1px solid var(--rule); }
  table.matrix thead th { text-align: left; font-family: var(--display); font-weight: 600; font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-dim); padding: 9px 14px; background: var(--bg-2); border-bottom: 1px solid var(--rule); }
  table.matrix td { font-family: var(--mono); font-size: 11px; color: var(--ink); padding: 9px 14px; border-bottom: 1px dashed var(--rule-soft); }
  table.matrix tbody tr:last-child td { border-bottom: 0; }
  table.matrix tbody tr:hover td { background: rgba(255,107,26,0.05); }
  table.matrix code { color: var(--ink-strong); }
  table.matrix .dim { color: var(--ink-dim); }
  table.matrix .ov { color: var(--amber); }
  .mx-kind { display: inline-flex; align-items: center; gap: 7px; font-family: var(--display); font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; font-size: 11px; }
  .mx-kind i { width: 8px; height: 8px; display: inline-block; }

  .lib-footer { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; padding: 30px 0 0; margin-top: 24px; border-top: 1px solid var(--rule); font-family: var(--mono); font-size: 11px; color: var(--ink-dim); letter-spacing: 0.18em; text-transform: uppercase; }
  .lib-footer .center { text-align: center; color: var(--ink-faint); }

  /* ---- responsive ---- */
  @media (max-width: 1080px) {
    .sheet-grid { grid-template-columns: 1fr; gap: 18px; }
    .lib-head h1 { font-size: 40px; }
  }
  @media (max-width: 640px) {
    .doc-grid { grid-template-columns: 1fr; }
    .sheet-hd { grid-template-columns: 44px 1fr; }
    .sheet-hd .n { font-size: 40px; }
    .sheet-hd .trig { grid-column: 1 / -1; text-align: left; flex-direction: row; gap: 8px; align-items: baseline; }
    .lib-head { grid-template-columns: auto 1fr; }
    .lib-head .meta { grid-column: 1 / -1; text-align: left; }
  }
</style>
</head>
